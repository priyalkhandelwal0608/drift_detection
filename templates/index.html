<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>Fraud Detection Form</h2>
        <form action="/predict" method="post">
            <label for="transaction_amount">Transaction Amount:</label>
            <input type="number" step="any" id="transaction_amount" name="transaction_amount" required>

            <label for="account_age_days">Account Age (days):</label>
            <input type="number" id="account_age_days" name="account_age_days" required>

            <label for="num_transactions">Number of Transactions:</label>
            <input type="number" id="num_transactions" name="num_transactions" required>

            <button type="submit">Predict</button>
        </form>

        <div id="result">
            {{ result }}
        </div>
    </div>
</body>
</html>
